name: Trigger Other Repositories

on:
push:
branches:
- main

jobs:
trigger-repo2:
runs-on: ubuntu-latest
steps:
- name: Trigger Repo2
run: |
curl -X POST 
-H "Accept: application/vnd.github+json" 
-H "Authorization: token ${{ secrets.PAT_TOKEN }}" 
https://api.github.com/repos/Arfaa49/Repo-2/dispatches 
-d '{"event_type":"run-tests"}'

trigger-repo3:
runs-on: ubuntu-latest
needs: trigger-repo2
steps:
- name: Trigger Repo3
run: |
curl -X POST 
-H "Accept: application/vnd.github+json" 
-H "Authorization: token ${{ secrets.PAT_TOKEN }}" 
https://api.github.com/repos/Arfaa49/Repo-3/dispatches 
-d '{"event_type":"run-tests"}'

trigger-repo4:
runs-on: ubuntu-latest
needs: trigger-repo3
steps:
- name: Trigger Repo4
run: |
curl -X POST 
-H "Accept: application/vnd.github+json" 
-H "Authorization: token ${{ secrets.PAT_TOKEN }}" 
https://api.github.com/repos/Arfaa49/Repo-4/dispatches 
-d '{"event_type":"run-tests"}'
